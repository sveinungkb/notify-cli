name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=darwin  GOARCH=amd64 go build -o notify && zip notify-mac-intel.zip notify && rm notify
          GOOS=darwin  GOARCH=arm64 go build -o notify && zip notify-mac-arm.zip   notify && rm notify
          GOOS=linux   GOARCH=amd64 go build -o notify && zip notify-linux.zip     notify && rm notify

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            notify-mac-intel.zip
            notify-mac-arm.zip
            notify-linux.zip
